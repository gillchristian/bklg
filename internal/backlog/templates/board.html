{{define "content"}}
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
  {{range .Columns}}
  <section class="bg-white rounded-lg border border-gray-200 shadow-sm">
    <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider px-3 py-2 border-b border-gray-100">
      {{.Title}} <span class="text-gray-400 font-normal">({{len .Cards}})</span>
    </h2>
    {{if .Cards}}
    <ul class="p-2 space-y-2">
      {{range .Cards}}
      <li class="rounded-md border border-gray-200 p-2.5 hover:border-gray-300{{if .ParkingLot}} bg-slate-50 opacity-75{{end}}">
        {{if .Badges}}
        <div class="flex flex-wrap items-center gap-1 mb-1.5">
          {{range .Badges}}<span class="inline-flex items-center rounded px-1.5 py-0.5 text-[11px] font-medium ring-1 ring-inset {{badgeClass .Kind}}">{{badgeText .}}</span>{{end}}
        </div>
        {{end}}
        <div class="text-sm leading-snug">
          {{if .ID}}<a class="font-mono text-xs text-blue-700 hover:underline" href="/{{.ID.Raw}}">{{.ID.Raw}}</a>
          <span class="text-gray-400">·</span> {{end}}<span>{{.Title}}</span>
        </div>
      </li>
      {{end}}
    </ul>
    {{else}}
    <p class="text-sm text-gray-400 italic px-3 py-4">nothing here</p>
    {{end}}
  </section>
  {{end}}
</div>
{{end}}
