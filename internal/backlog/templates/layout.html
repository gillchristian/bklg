{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bklg — {{.PlanningDir}}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
<div class="max-w-7xl mx-auto p-4 sm:p-6">
  <header class="mb-5">
    <h1 class="text-xl font-semibold tracking-tight">bklg</h1>
    <p class="text-sm text-gray-500 font-mono">{{.PlanningDir}}</p>
    {{if .Warnings}}
    <div class="mt-3 text-sm bg-amber-50 text-amber-800 border border-amber-200 rounded-md px-3 py-2">
      {{len .Warnings}} parse warning{{if gt (len .Warnings) 1}}s{{end}} —
      <a class="font-medium underline hover:no-underline" href="/_diag">/_diag</a>
    </div>
    {{end}}
  </header>
  {{template "content" .}}
</div>
</body>
</html>{{end}}
